<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Simple Blog{% endblock %}</title>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --bg:         #0f0f0f;
      --surface:    #191919;
      --border:     #2a2a2a;
      --accent:     #c9a96e;       /* warm gold */
      --accent-dim: #8a6f44;
      --text:       #e8e0d5;
      --muted:      #7a7068;
      --danger:     #b85c5c;
      --radius:     10px;
      --max-w:      760px;
      --font-head:  'Playfair Display', Georgia, serif;
      --font-body:  'DM Sans', sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Noise texture overlay ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header / Nav ──────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-family: var(--font-head);
      font-size: 1.35rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .brand span { font-style: italic; color: var(--text); font-weight: 400; }

    nav { display: flex; gap: 8px; align-items: center; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      padding: 7px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    nav a:hover { color: var(--text); background: var(--surface); }

    .btn-nav {
      background: var(--accent) !important;
      color: #0f0f0f !important;
      font-weight: 500 !important;
    }

    .btn-nav:hover { background: var(--accent-dim) !important; }

    /* ── Page Wrapper ──────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Page Hero / Title ─────────────────────────────────── */
    .page-hero {
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .page-hero .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .page-hero h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      color: var(--text);
      font-weight: 700;
    }

    .page-hero p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Blog Post Cards ───────────────────────────────────── */
    .post-list { display: flex; flex-direction: column; gap: 20px; }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      transition: border-color 0.25s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .post-card:hover { border-color: var(--accent-dim); transform: translateY(-2px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .post-card h2 {
      font-family: var(--font-head);
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .post-card p {
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: all 0.18s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
      border-color: var(--accent);
    }

    .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: #444; background: var(--surface); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border-color: #3a2020;
    }

    .btn-danger:hover { background: #2a1515; border-color: var(--danger); }

    /* ── Empty State ───────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty .emoji { font-size: 3rem; margin-bottom: 16px; }
    .empty h3 { font-family: var(--font-head); color: var(--text); margin-bottom: 8px; }

    /* ── Form Styles ───────────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      animation: fadeUp 0.35s ease both;
    }

    .form-group { margin-bottom: 24px; }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus { border-color: var(--accent); }

    textarea { min-height: 180px; line-height: 1.65; }

    .form-actions { display: flex; gap: 12px; align-items: center; margin-top: 8px; }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer span { color: var(--accent); }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 520px) {
      .form-card { padding: 24px 20px; }
      .post-card  { padding: 22px 20px; }
    }
  </style>
</head>
<body>

  <!-- ── Navigation ── -->
  <header>
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="brand">The<span>Blog</span></a>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('create') }}" class="btn-nav">+ New Post</a>
      </nav>
    </div>
  </header>

  <!-- ── Page Content ── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer>
    Built with <span>Flask</span> &amp; Python &nbsp;·&nbsp; Experiment-5
  </footer>

</body>
</html>
